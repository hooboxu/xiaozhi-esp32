name: Build Waveshare 4.2

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允许手动点击按钮触发编译

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.2 # 确保使用官方推荐的版本
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive # 关键：必须拉取所有驱动子模块
          fetch-depth: 0

      - name: Build with Release Script
        shell: bash
        run: |
          # 1. 加载 ESP-IDF 环境
          . $IDF_PATH/export.sh
          
          # 2. 运行优化后的脚本
          # 脚本会自动清理旧缓存并注入 N16R8 模组所需的 PSRAM 八线配置
          python3 scripts/release.py

      - name: Upload Firmware
        if: success() # 只有编译成功才上传
        uses: actions/upload-artifact@v4
        with:
          name: waveshare-4.2-firmware
          path: releases/*.zip
