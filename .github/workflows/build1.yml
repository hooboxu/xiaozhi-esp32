name: Build Waveshare 4.2

on:
  workflow_dispatch: # 允许你手动点击按钮编译
  push:
    branches: [ main ]

jobs:
  build:
    name: Build Waveshare 4.2 Only
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.2 # 建议先用回 5.5.2，这个项目最稳的版本
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive # 必须带这个，否则没有音频和屏幕驱动
          fetch-depth: 0

      - name: Clean and Prepare Config
        shell: bash
        run: |
          # 1. 彻底清理旧缓存
          rm -rf build sdkconfig
          
          # 2. 补全微雪 4.2 的 secret 文件
          cp main/boards/waveshare-s3-rlcd-4.2/secret_config.h.example main/boards/waveshare-s3-rlcd-4.2/secret_config.h || true
          
          # 3. 预设 SDK 选项，确保它知道这是微雪 4.2 板子
          # 我们跳过 python 脚本，直接手动写入配置
          echo "CONFIG_BOARD_TYPE_WAVESHARE_S3_RLCD_4_2=y" > sdkconfig
          echo "CONFIG_USE_WECHAT_MESSAGE_STYLE=n" >> sdkconfig
          echo "CONFIG_USE_DEVICE_AEC=y" >> sdkconfig

      - name: Compile and Merge
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          
          # 设置目标并执行编译
          idf.py set-target esp32s3
          
          # 直接注入 BOARD_NAME 和 BOARD_TYPE 参数
          idf.py -DBOARD_NAME=waveshare-s3-rlcd-4.2 -DBOARD_TYPE=waveshare-s3-rlcd-4.2 build
          
          # 合并为单个烧录 bin
          idf.py merge-bin

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: waveshare-4.2-rlcd-firmware
          path: build/merged-binary.bin
