name: Build Waveshare 4.2

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允许你在 GitHub 页面上手动点击按钮开始编译

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.2 # 确保使用官方推荐的 v5.5.2 版本
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive # 关键：必须递归拉取驱动库
          fetch-depth: 0

      - name: Build with Release Script
        shell: bash
        run: |
          # 1. 加载 IDF 环境
          . $IDF_PATH/export.sh
          
          # 2. 运行你修改后的脚本 (它现在只编译微雪 4.2)
          python scripts/release.py

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: waveshare-4.2-firmware
          # 脚本运行完后，releases 目录下会生成 zip 包，直接上传
          path: releases/*.zip
